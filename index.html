<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="img/icontab (1).png" />
    <title>Security Checker - Avast UK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .quiz-container {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .avast-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .avast-logo img {
            width: 40px;
            height: 40px;
        }
        .avast-logo span {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .progress {
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            margin-bottom: 32px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .step-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 28px;
            text-align: center;
            line-height: 1.3;
            color: #f0f0f0;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 500;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(8px);
        }
        .option-btn:hover {
            background: rgba(255, 126, 95, 0.15);
            border-color: #ff7e5f;
            color: #fff;
            transform: translateY(-1px);
        }
        .option-btn.selected {
            background: rgba(255, 126, 95, 0.25);
            border-color: #ff7e5f;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 126, 95, 0.3);
        }
        .btn-disabled {
            pointer-events: none;
            opacity: 0.5;
        }
        .result-box {
            background: rgba(220, 20, 60, 0.15);
            border: 1px solid rgba(220, 20, 60, 0.4);
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            margin: 24px 0;
        }
        .risk-level {
            font-size: 2.4rem;
            font-weight: 800;
            color: #ff4d6a;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        .threat-list {
            list-style: none;
            text-align: left;
            margin: 24px 0;
        }
        .threat-list li {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: #ccc;
        }
        .cta-button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 25px -8px rgba(255, 126, 95, 0.4);
            margin-top: 16px;
        }
        .cta-button:hover {
            transform: scale(1.02);
            box-shadow: 0 14px 30px -6px rgba(255, 126, 95, 0.6);
            filter: brightness(1.05);
        }
        .discount-badge {
            background: #ff4d6a;
            color: white;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-block;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }
        .timer {
            font-weight: 600;
            color: #feb47b;
            margin: 12px 0 0;
        }
        .hidden {
            display: none;
        }
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }
        .loader {
            text-align: center;
            padding: 30px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff7e5f;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .geo-display {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.08);
            display: inline-block;
            width: auto;
            padding: 5px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        .geo-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .quiz-container {
                padding: 28px 20px;
            }
            .step-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Tracking pixel (page load) -->
    <img src="https://mqglly.abadit5rckb.com/trackpixel/track?tid=:cid&amt=:payout" width="1" height="1" style="display:none;" />

    <!-- iFrame pixel -->
    <iframe width="1" height="1" border="0" style="display: none;" src="http://abpostback.com/pixel/script?tid=YOUR_NETWORK_TOKEN&amt=REPLACE&txid=REPLACE&status=REPLACE"></iframe>

    <div class="quiz-container" id="quizContainer">
        <div class="avast-logo">
            <img src="img/logo1200.png" alt="Avast Logo" />
            <span>Avast</span>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>

        <div id="dynamicContent"></div>
    </div>

    <script>
        // ============================================================
        //  UK OFFER URL
        // ============================================================
        const OFFER_URL =
            'https://yohch.com/af?o=cf09f5874b68197ab336f84831006a81:babed8d3cbcc99d9fcdf9d14c0dd577e&cid=&subid=';

        // ============================================================
        //  GLOBAL STATE
        // ============================================================
        let userGeoCode = 'GB';
        let userGeoName = 'United Kingdom';
        let currentStep = 0;
        let totalWeight = 0;
        let answers = [];

        // ============================================================
        //  UK ENGLISH CONTENT — everything is UK‑specific
        // ============================================================
        const UK = {
            loadingGeo: 'Detecting your region…',

            questions: [
                'How often do you shop online or use mobile banking?',
                'Has your PC been running slower or overheating for no obvious reason?',
                'Do you use the same password across multiple accounts or services?'
            ],

            options: [
                ['Every day', 'Several times a week', 'Rarely'],
                ['Yes, a lot recently', 'A little, sometimes', 'No, everything is normal'],
                ['Yes, for almost all', 'Some are repeated', 'No, each is unique']
            ],

            optionIcons: [
                ['🛒', '💳', '🏦'],
                ['🐌', '⏳', '✅'],
                ['🔑', '🔐', '🛡️']
            ],

            optionWeights: [
                [3, 2, 1],
                [3, 2, 0],
                [3, 2, 0]
            ],

            loader: {
                analyzing: 'Analysing your answers…',
                verifying: 'Checking security risks'
            },

            riskPrefix: 'RISK',
            riskLevels: { high: 'HIGH', medium: 'MEDIUM', low: 'LOW' },

            threatLists: {
                high: [
                    '🔴 Possible theft of banking details and passwords.',
                    '🔴 Unwanted programs tracking your activity in the background.',
                    '🔴 Risk of identity theft (phishing attacks).'
                ],
                medium: [
                    '🟠 Your personal information may be exposed on public networks.',
                    '🟠 Unusual background activity detected.',
                    '🟠 Vulnerabilities due to repeated passwords.'
                ],
                low: [
                    '🟢 No serious threats detected, but your device may still be vulnerable to future attacks.',
                    '🟢 Absence of symptoms does not guarantee complete security.'
                ]
            },

            trustText: '🧑‍💻 <strong>435 million users</strong> trust Avast worldwide',
            awardText: 'Best Protection Award 2025 by AV-Comparatives',
            buttonText: 'Activate Avast Premium',
            discountBadge: '-60% TODAY',
            timerPrefix: '⏳ Limited‑time offer: ',
            exclusivePrefix: '🌎 Exclusive offer for residents of ',
            geoLabel: '📍 Your location:'
        };

        // ============================================================
        //  GEO DETECTION — prefer UK, fallback to English
        // ============================================================
        async function detectUserGeo() {
            try {
                const resp = await fetch('https://ipapi.co/json/');
                if (!resp.ok) throw new Error('GeoAPI error');
                const data = await resp.json();
                const code = data.country_code || 'GB';
                const name = data.country_name || 'United Kingdom';
                // If it's UK (GB) or any other, we keep it as is — but we always display UK‑tailored content
                return { code, name };
            } catch (_) {
                // Fallback: always show UK
                return { code: 'GB', name: 'United Kingdom' };
            }
        }

        // ============================================================
        //  INIT — no loading animation, straight to quiz
        // ============================================================
        async function initQuiz() {
            const geo = await detectUserGeo();
            // Always keep UK as the primary display, but we store the real geo
            userGeoCode = geo.code;
            userGeoName = geo.name;

            // If the user is actually in the UK, show that; otherwise still show "United Kingdom"
            // to keep the offer UK‑focused.
            if (geo.code === 'GB' || geo.code === 'UK') {
                userGeoName = 'United Kingdom';
                userGeoCode = 'GB';
            } else {
                // We still show UK as the target market for the offer
                userGeoName = 'United Kingdom';
                userGeoCode = 'GB';
            }

            startQuiz();
        }

        function startQuiz() {
            currentStep = 0;
            totalWeight = 0;
            answers = [];
            const bar = document.getElementById('progressBar');
            if (bar) bar.style.width = '0%';
            renderQuestion(0);
        }

        // ============================================================
        //  RENDER QUESTION
        // ============================================================
        function renderQuestion(index) {
            const t = UK;
            if (index >= t.questions.length) {
                showAnalysis();
                return;
            }

            const bar = document.getElementById('progressBar');
            bar.style.width = ((index / t.questions.length) * 100) + '%';

            const q = t.questions[index];
            const opts = t.options[index];
            const icons = t.optionIcons[index];
            const weights = t.optionWeights[index];

            let html = `<div class="step-title">${q}</div><div class="options">`;
            for (let i = 0; i < opts.length; i++) {
                html += `
                        <div class="option-btn" data-weight="${weights[i]}" data-answer="${opts[i]}">
                            <span class="icon">${icons[i]}</span>
                            <span>${opts[i]}</span>
                        </div>
                    `;
            }
            html += `</div>`;
            document.getElementById('dynamicContent').innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.classList.contains('btn-disabled')) return;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    const weight = parseInt(this.dataset.weight);
                    totalWeight += weight;
                    answers.push({
                        question: t.questions[currentStep],
                        answer: this.dataset.answer,
                        weight: weight
                    });
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.add('btn-disabled'));
                    setTimeout(() => {
                        currentStep++;
                        renderQuestion(currentStep);
                    }, 300);
                });
            });
        }

        // ============================================================
        //  FINAL ANALYSIS + RESULTS + GEO DISPLAY
        // ============================================================
        function showAnalysis() {
            const dyn = document.getElementById('dynamicContent');
            const t = UK;
            const bar = document.getElementById('progressBar');
            bar.style.width = '100%';

            // Show loader while we "analyse"
            dyn.innerHTML = `
                    <div class="loader">
                        <div class="spinner"></div>
                        <p style="color:#ccc;">${t.loader.analyzing}</p>
                        <p style="font-size:0.8rem; color:#888;">${t.loader.verifying}</p>
                    </div>
                `;

            setTimeout(() => {
                let riskKey = 'low';
                if (totalWeight >= 8) riskKey = 'high';
                else if (totalWeight >= 5) riskKey = 'medium';
                else riskKey = 'low';

                const level = t.riskLevels[riskKey];
                let threats = [];
                if (riskKey === 'high') threats = t.threatLists.high;
                else if (riskKey === 'medium') threats = t.threatLists.medium;
                else threats = t.threatLists.low;

                // Build the exclusive region text (always UK)
                const exclusiveText = `${t.exclusivePrefix}${userGeoName}`;

                // Geo display badge
                const geoBadge = `
                        <div class="geo-wrapper">
                            <div class="geo-display">
                                ${t.geoLabel} ${userGeoName} 🇬🇧
                            </div>
                        </div>
                    `;

                const html = `
                        <div class="result-box">
                            <div class="risk-level">${t.riskPrefix} ${level}</div>
                            <p style="font-size:1rem; margin-bottom:8px;">Based on your answers, your PC shows:</p>
                            <ul class="threat-list">
                                ${threats.map(th => `<li>${th}</li>`).join('')}
                            </ul>
                        </div>
                        <div style="text-align:center; margin-top:12px;">
                            <p style="font-weight:500; margin-bottom:4px;">${t.trustText}</p>
                            <p style="font-size:0.9rem; color:#ccc;">${t.awardText}</p>
                        </div>
                        <a href="${OFFER_URL}" class="cta-button" id="ctaButton" target="_blank">
                            ${t.buttonText} <span class="discount-badge">${t.discountBadge}</span>
                        </a>
                        ${geoBadge}
                        <p class="timer" id="timerText">${t.timerPrefix}<span id="countdown">05:00</span></p>
                        <p style="font-size:0.9rem; text-align:center; margin-top:16px; color:#ddd;">
                            ${exclusiveText}
                        </p>
                    `;
                dyn.innerHTML = html;
                startCountdown();
            }, 2500);
        }

        // ============================================================
        //  COUNTDOWN
        // ============================================================
        function startCountdown() {
            let time = 300;
            const el = document.getElementById('countdown');
            if (!el) return;
            const interval = setInterval(() => {
                if (time <= 0) {
                    clearInterval(interval);
                    if (el) el.textContent = '00:00';
                    const timerSpan = document.getElementById('timerText');
                    if (timerSpan) {
                        timerSpan.innerHTML =
                            '⚠️ The offer has expired. Refresh the page to check availability.';
                    }
                    return;
                }
                time--;
                const m = Math.floor(time / 60);
                const s = time % 60;
                if (el) el.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }, 1000);
        }

        // ============================================================
        //  START
        // ============================================================
        initQuiz();
    </script>
</body>
</html>
